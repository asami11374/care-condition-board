<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>体調不良者管理表（3月・構造化テキスト反映版 v4）</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --ink: #13233b;
      --muted: #5f6f84;
      --line: #9aaac1;
      --line-strong: #40597d;
      --header: #17345a;
      --accent: #1f67c5;
      --danger: #be2933;
      --warn: #b06a04;
      --ok: #25623b;
      --shadow: 0 8px 20px rgba(20, 41, 73, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    .app {
      max-width: 1700px;
      margin: 0 auto;
      padding: 12px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .title {
      margin: 0;
      font-size: 1.15rem;
      letter-spacing: 0.03em;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    button, .file-label {
      border: 1px solid var(--line-strong);
      background: #fff;
      color: var(--ink);
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    button.primary { background: var(--header); color: #fff; }
    button.warn { background: #fff8ec; color: var(--warn); border-color: var(--warn); }
    button:hover, .file-label:hover { filter: brightness(0.97); }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 10px;
      margin-bottom: 12px;
    }

    .tabs { display: flex; gap: 8px; margin-bottom: 8px; }
    .tab.active { background: var(--header); color: #fff; }

    .hidden { display: none !important; }

    .new-form {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 8px;
      align-items: end;
      margin-bottom: 8px;
    }
    .field label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 6px;
      font: inherit;
      background: #fff;
    }

    .calendar-wrap {
      overflow: auto;
      border: 3px solid var(--line-strong);
      border-radius: 4px;
      background: #fff;
    }

    table { border-collapse: collapse; width: max-content; min-width: 100%; }

    .calendar th, .calendar td {
      border: 1.5px solid var(--line);
      padding: 4px 6px;
      vertical-align: middle;
      font-size: 0.83rem;
      background: #fff;
    }

    .calendar thead th {
      position: sticky;
      top: 0;
      z-index: 3;
      background: #e9f0fb;
      border-bottom: 2px solid var(--line-strong);
      text-align: center;
      min-width: 76px;
    }

    .sticky-col {
      position: sticky;
      left: 0;
      z-index: 2;
      min-width: 130px;
      background: #f7faff !important;
      border-right: 2px solid var(--line-strong) !important;
    }
    .sticky-col.room { left: 130px; min-width: 82px; }
    .sticky-col.item { left: 212px; min-width: 130px; }

    .resident-start td { border-top: 3px solid var(--line-strong); }
    .resident-end td { border-bottom: 3px solid var(--line-strong); }
    .resident-start td, .resident-end td { background-image: linear-gradient(to bottom, rgba(240,246,255,0.28), rgba(255,255,255,0)); }

    .item-label { font-weight: 700; color: #244872; background: #f1f6ff; }

    .day-cell {
      cursor: pointer;
      min-height: 28px;
      min-width: 76px;
      text-align: center;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .status-fever { background: #ffe8eb !important; color: #a21a2d; }
    .status-symptom { background: #fff5e2 !important; color: #8e5702; }
    .status-treatment { background: #e8f8ee !important; color: #1f6038; }
    .status-observe { background: #edf3ff !important; color: #1c4d95; }
    .status-cleared { background: #eef7ef !important; color: #2e6a40; }
    .status-closed { background: #ececec !important; color: #545454; }

    .calendar-note { font-weight: 400; font-size: 0.72rem; display: block; color: #36485f; }

    .back-table-wrap { overflow: auto; border: 2px solid var(--line-strong); border-radius: 4px; }
    .back-table th, .back-table td {
      border: 1px solid var(--line);
      padding: 4px;
      font-size: 0.83rem;
      vertical-align: top;
      background: #fff;
    }
    .back-table th {
      background: #e9f0fb;
      border-bottom: 2px solid var(--line-strong);
      position: sticky;
      top: 0;
      z-index: 1;
      white-space: nowrap;
    }

    .cell-input, .cell-select, .cell-textarea {
      width: 100%;
      border: 1px solid #b4c0d2;
      border-radius: 4px;
      padding: 5px;
      font: inherit;
      min-width: 100px;
      background: #fff;
    }
    .cell-textarea { min-height: 52px; resize: vertical; }

    .priority-高 { color: var(--danger); font-weight: 700; }
    .priority-中 { color: var(--warn); font-weight: 700; }
    .priority-低 { color: var(--ok); font-weight: 700; }

    .small { font-size: 0.78rem; color: var(--muted); }
    .legend {
      margin: 6px 0 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .chip {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      background: #f8fbff;
      color: #26496f;
      font-weight: 600;
    }
    .chip.auto { background: #eaf3ff; border-color: #6e95c4; }
    .chip.manual { background: #fff5e6; border-color: #c59247; }
    .temp-badge {
      display: inline-block;
      margin-left: 2px;
      padding: 1px 6px;
      border-radius: 999px;
      border: 1px solid #c8868f;
      background: #fff5f7;
      color: #9b1f31;
      font-size: 0.71rem;
      font-weight: 700;
    }
    .field-mode-auto { background: #f7fbff !important; }
    .field-mode-manual { background: #fff9f1 !important; }

    dialog {
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      width: min(480px, 96vw);
      box-shadow: var(--shadow);
    }
    .modal-grid { display: grid; gap: 8px; }

    @media (max-width: 1200px) {
      .new-form { grid-template-columns: repeat(3, minmax(120px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <h1 class="title">体調不良者管理表（2026年3月） 表面＝カレンダー／裏面＝実務一覧【構造化テキスト反映版】</h1>
      <div class="button-row">
        <button id="saveBtn" class="primary">保存</button>
        <button id="exportJsonBtn">JSON出力</button>
        <label class="file-label">JSON取込<input id="importJsonInput" type="file" accept="application/json" class="hidden"></label>
        <button id="exportCsvBtn">CSV出力</button>
        <button id="resetBtn" class="warn">初期化</button>
      </div>
    </div>

    <div class="panel">
      <div class="tabs">
        <button class="tab active" data-tab="front">表面（カレンダー）</button>
        <button class="tab" data-tab="back">裏面（実務一覧）</button>
      </div>

      <form id="newResidentForm" class="new-form" autocomplete="off">
        <div class="field"><label>氏名 *</label><input required name="name"></div>
        <div class="field"><label>部屋 *</label><input required name="room"></div>
        <div class="field"><label>フロア *</label>
          <select name="floor" required><option value="">選択</option><option>2F</option><option>3F</option><option>4F</option><option>5F</option></select>
        </div>
        <div class="field"><label>優先度 *</label>
          <select name="priority" required><option value="">選択</option><option>高</option><option>中</option><option>低</option></select>
        </div>
        <div class="field"><label>把握日 *</label><input required name="catchDate" type="date"></div>
        <div class="field"><label>主症状 *</label><input required name="mainSymptom"></div>
        <div class="field"><button class="primary" type="submit">対象者を追加</button></div>
      </form>

      <div id="frontPanel">
        <div class="small">この版は構造化テキスト反映版です。日付セルをクリックすると、その日の状態（発熱・症状・対応・観察・終結）を簡易入力できます。</div>
        <div class="legend">
          <span class="chip auto">自動反映: onset_date / daily_course / temperature_c</span>
          <span class="chip manual">手入力: 裏面詳細項目（検査・処方・家族連絡など）</span>
        </div>
        <div class="calendar-wrap"><table id="calendarTable" class="calendar"></table></div>
      </div>

      <div id="backPanel" class="hidden">
        <div class="back-table-wrap"><table id="backTable" class="back-table"></table></div>
      </div>
    </div>
  </div>

  <dialog id="dayDialog">
    <form method="dialog" class="modal-grid" id="dayForm">
      <strong id="dayDialogTitle">日次入力</strong>
      <label>状態
        <select name="status">
          <option value="">なし</option>
          <option value="fever">発熱</option>
          <option value="symptom">症状あり</option>
          <option value="treatment">処置・治療</option>
          <option value="observe">経過観察</option>
          <option value="cleared">軽快</option>
          <option value="closed">終結</option>
        </select>
      </label>
      <label>短縮メモ（例: 37.8℃ / 抗原陰性）
        <input name="note" maxlength="24">
      </label>
      <div class="button-row" style="justify-content:flex-end;">
        <button value="cancel">取消</button>
        <button value="save" class="primary">保存</button>
      </div>
    </form>
  </dialog>

  <script>
    const STORAGE_KEY = 'care-condition-board-v4';

    /** 単一データ源 */
    const state = {
      meta: {
        year: 2026,
        month: 3,
        displayRange: ['2026-03-19', '2026-04-01'],
        timezone: 'Asia/Tokyo'
      },
      residents: []
    };

    // タイムゾーン依存回避のため、曜日計算はUTC基準で固定。
    function getWeekdayJa(isoDate) {
      const [y, m, d] = isoDate.split('-').map(Number);
      const weekday = new Date(Date.UTC(y, m - 1, d, 12, 0, 0)).getUTCDay();
      return ['日', '月', '火', '水', '木', '金', '土'][weekday];
    }

    function buildDateList(startIso, endIso) {
      const list = [];
      const start = new Date(startIso + 'T00:00:00Z');
      const end = new Date(endIso + 'T00:00:00Z');
      for (let t = start.getTime(); t <= end.getTime(); t += 24 * 60 * 60 * 1000) {
        const dt = new Date(t);
        const y = dt.getUTCFullYear();
        const m = String(dt.getUTCMonth() + 1).padStart(2, '0');
        const d = String(dt.getUTCDate()).padStart(2, '0');
        const iso = `${y}-${m}-${d}`;
        list.push({
          iso,
          label: `${m}/${d}`,
          weekday: getWeekdayJa(iso)
        });
      }
      return list;
    }

    const dateList = buildDateList(state.meta.displayRange[0], state.meta.displayRange[1]);

    const STRUCTURED_TEXT_SOURCE = [
      {
        name: '安齋',
        room: '201',
        floor: '2F',
        priority: '高',
        onset_date: '2026-03-20',
        daily_course: [
          { date: '2026-03-20', time_used: '09:00', temperature_c: 38.1, symptoms_present: true, symptoms: '咽頭痛、倦怠感', status: 'fever' },
          { date: '2026-03-21', time_used: '10:00', temperature_c: 37.8, symptoms_present: true, symptoms: '咳、食欲低下', status: 'symptom' },
          { date: '2026-03-22', time_used: '09:30', temperature_c: 37.4, symptoms_present: true, symptoms: '咳持続', status: 'observe' },
          { date: '2026-03-23', time_used: '09:30', temperature_c: 37.1, symptoms_present: false, symptoms: '全身状態安定', status: 'cleared' }
        ]
      },
      {
        name: '有福',
        room: '202',
        floor: '2F',
        priority: '中',
        onset_date: '2026-03-21',
        daily_course: [
          { date: '2026-03-21', time_used: '08:45', temperature_c: 37.9, symptoms_present: true, symptoms: '微熱、鼻汁', status: 'fever' },
          { date: '2026-03-22', time_used: '09:20', temperature_c: 37.3, symptoms_present: true, symptoms: '鼻汁、軽度咳嗽', status: 'symptom' },
          { date: '2026-03-23', time_used: '09:00', temperature_c: 36.9, symptoms_present: true, symptoms: '軽咳', status: 'observe' },
          { date: '2026-03-24', time_used: '09:00', temperature_c: 36.7, symptoms_present: false, symptoms: '症状ほぼ消失', status: 'cleared' }
        ]
      },
      {
        name: '健康',
        room: '301',
        floor: '3F',
        priority: '中',
        onset_date: '2026-03-19',
        daily_course: [
          { date: '2026-03-19', time_used: '11:00', temperature_c: 38.4, symptoms_present: true, symptoms: '発熱、喀痰', status: 'fever' },
          { date: '2026-03-20', time_used: '11:00', temperature_c: 37.9, symptoms_present: true, symptoms: '喀痰増加', status: 'treatment' },
          { date: '2026-03-21', time_used: '10:20', temperature_c: 37.5, symptoms_present: true, symptoms: '咳嗽', status: 'observe' },
          { date: '2026-03-23', time_used: '10:20', temperature_c: 36.8, symptoms_present: false, symptoms: '呼吸状態改善', status: 'cleared' }
        ]
      },
      {
        name: '恋',
        room: '302',
        floor: '3F',
        priority: '低',
        onset_date: '2026-03-22',
        daily_course: [
          { date: '2026-03-22', time_used: '14:00', temperature_c: 37.6, symptoms_present: true, symptoms: '微熱、頭痛', status: 'fever' },
          { date: '2026-03-23', time_used: '14:00', temperature_c: 37.2, symptoms_present: true, symptoms: '頭痛軽減', status: 'symptom' },
          { date: '2026-03-24', time_used: '14:00', temperature_c: 36.8, symptoms_present: false, symptoms: '症状なし', status: 'cleared' },
          { date: '2026-03-25', time_used: '14:00', temperature_c: 36.6, symptoms_present: false, symptoms: '終結判定', status: 'closed' }
        ]
      },
      {
        name: 'ミツオカ',
        room: '401',
        floor: '4F',
        priority: '高',
        onset_date: '2026-03-23',
        daily_course: [
          { date: '2026-03-23', time_used: '07:50', temperature_c: 38.3, symptoms_present: true, symptoms: '悪寒、咽頭痛', status: 'fever' },
          { date: '2026-03-24', time_used: '08:20', temperature_c: 38.0, symptoms_present: true, symptoms: '咽頭痛持続', status: 'treatment' },
          { date: '2026-03-25', time_used: '08:20', temperature_c: 37.5, symptoms_present: true, symptoms: '咳出現', status: 'observe' },
          { date: '2026-03-26', time_used: '08:20', temperature_c: 37.1, symptoms_present: true, symptoms: '軽咳', status: 'symptom' }
        ]
      },
      {
        name: 'せいの',
        room: '402',
        floor: '4F',
        priority: '中',
        onset_date: '2026-03-20',
        daily_course: [
          { date: '2026-03-20', time_used: '13:10', temperature_c: 38.0, symptoms_present: true, symptoms: '発熱、関節痛', status: 'fever' },
          { date: '2026-03-21', time_used: '13:10', temperature_c: 37.7, symptoms_present: true, symptoms: '関節痛持続', status: 'symptom' },
          { date: '2026-03-22', time_used: '13:10', temperature_c: 37.3, symptoms_present: true, symptoms: '倦怠感', status: 'observe' },
          { date: '2026-03-24', time_used: '13:10', temperature_c: 36.9, symptoms_present: false, symptoms: '食事摂取改善', status: 'cleared' }
        ]
      }
    ];

    function normalizeStructuredResidents(source) {
      const normalizedStatus = (entry) => {
        if (entry.status) return entry.status;
        return entry.symptoms_present ? 'symptom' : 'observe';
      };
      return source.map((person) => {
        const onset = person.onset_date;
        const sortedCourse = [...person.daily_course]
          .filter((entry) => entry.date >= onset)
          .sort((a, b) => a.date.localeCompare(b.date));
        const first = sortedCourse[0];
        const allSymptoms = sortedCourse.map((entry) => entry.symptoms).filter(Boolean);
        const last = sortedCourse[sortedCourse.length - 1];

        const calendar = {};
        sortedCourse.forEach((entry) => {
          const symptomLabel = entry.symptoms ? entry.symptoms : '記載なし';
          const symptomPresence = entry.symptoms_present ? '症状:有' : '症状:無';
          calendar[entry.date] = {
            status: normalizedStatus(entry),
            note: [entry.time_used, symptomPresence, symptomLabel].filter(Boolean).join(' / '),
            temperature_c: entry.temperature_c,
            symptoms_present: entry.symptoms_present,
            symptoms: entry.symptoms
          };
        });

        return {
          id: crypto.randomUUID(),
          name: person.name,
          room: person.room,
          floor: person.floor,
          priority: person.priority,
          catchDate: onset,
          symptoms: allSymptoms.join('、'),
          testResult: '',
          treatment: '',
          mealWater: '',
          vitalsFinding: first ? `${first.time_used} ${first.temperature_c.toFixed(1)}℃` : '',
          familyContact: '',
          consultation: '',
          progressNext: last ? `${last.date} 再判定` : '',
          calendar
        };
      });
    }

    function createDefaultResidents() {
      return normalizeStructuredResidents(STRUCTURED_TEXT_SOURCE);
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        state.residents = createDefaultResidents();
        return;
      }
      try {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed.residents)) {
          state.meta = { ...state.meta, ...(parsed.meta || {}) };
          state.residents = parsed.residents;
        } else {
          state.residents = createDefaultResidents();
        }
      } catch {
        state.residents = createDefaultResidents();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function renderAll() {
      renderCalendar();
      renderBackTable();
    }

    function renderCalendar() {
      const table = document.getElementById('calendarTable');
      const headDateCells = dateList.map(d => `<th>${d.label}<br>${d.weekday}</th>`).join('');
      let html = `
        <thead>
          <tr>
            <th class="sticky-col">氏名</th>
            <th class="sticky-col room">居室</th>
            <th class="sticky-col item">項目</th>
            ${headDateCells}
          </tr>
        </thead>
        <tbody>
      `;

      const rows = [
        ['発症日(onset)', r => `${r.catchDate || ''}`],
        ['症状経過(daily)', r => r.symptoms || ''],
        ['検査/観察', r => (r.testResult || '') + (r.vitalsFinding ? ` / ${r.vitalsFinding}` : '')],
        ['処置/終結判断', r => (r.treatment || '') + (r.progressNext ? ` / ${r.progressNext}` : '')]
      ];

      state.residents.forEach((resident, i) => {
        rows.forEach(([label, summary], rowIdx) => {
          html += `<tr class="${rowIdx === 0 ? 'resident-start' : ''} ${rowIdx === rows.length - 1 ? 'resident-end' : ''}">`;
          if (rowIdx === 0) {
            html += `<td class="sticky-col" rowspan="${rows.length}">${resident.name}<br><span class="priority-${resident.priority}">優先:${resident.priority}</span></td>`;
            html += `<td class="sticky-col room" rowspan="${rows.length}">${resident.room}<br>${resident.floor}</td>`;
          }
          html += `<td class="sticky-col item item-label">${label}</td>`;

          dateList.forEach(d => {
            const e = resident.calendar?.[d.iso] || {};
            const cls = e.status ? `status-${e.status}` : '';
            const tempBadge = Number.isFinite(e.temperature_c) ? `<span class="temp-badge">${e.temperature_c.toFixed(1)}℃</span>` : '';
            const content = e.status ? `${statusShort(e.status)}${tempBadge}<span class="calendar-note">${e.note || ''}</span>` : (rowIdx === 0 ? shortDateInfo(resident, d.iso, summary(resident)) : '');
            html += `<td class="day-cell ${cls}" data-resident-id="${resident.id}" data-date="${d.iso}" data-row="${rowIdx}">${content}</td>`;
          });
          html += `</tr>`;
        });
      });

      html += '</tbody>';
      table.innerHTML = html;
    }

    function shortDateInfo(resident, iso, fallback = '') {
      if (resident.catchDate === iso) return '把握';
      return fallback ? '<span class="calendar-note">' + escapeHtml(fallback).slice(0, 18) + '</span>' : '';
    }

    function statusShort(status) {
      return ({ fever: '発熱', symptom: '症状', treatment: '処置', observe: '観察', cleared: '軽快', closed: '終結' }[status] || '');
    }

    function renderBackTable() {
      const headers = [
        ['name', '氏名', 'auto'], ['room', '部屋', 'auto'], ['floor', 'フロア', 'auto'], ['priority', '優先度', 'auto'], ['catchDate', '把握日', 'auto'],
        ['symptoms', '症状', 'auto'], ['testResult', '検査結果', 'manual'], ['treatment', '処方・対応', 'manual'], ['mealWater', '食事・水分', 'manual'],
        ['vitalsFinding', 'バイタル・所見', 'manual'], ['familyContact', '家族連絡', 'manual'], ['consultation', '受診', 'manual'], ['progressNext', '経過・次対応', 'manual']
      ];

      let html = '<thead><tr>' + headers.map(([, label, mode]) => `<th class="field-mode-${mode}">${label}<br><span class="small">${mode === 'auto' ? '自動' : '手入力'}</span></th>`).join('') + '<th>削除</th></tr></thead><tbody>';
      state.residents.forEach(r => {
        html += '<tr>' + headers.map(([key]) => `<td>${editableCell(r, key)}</td>`).join('') + `<td><button data-delete="${r.id}">削除</button></td></tr>`;
      });
      html += '</tbody>';
      document.getElementById('backTable').innerHTML = html;
    }

    function editableCell(r, key) {
      const value = escapeHtml(r[key] || '');
      if (key === 'floor') {
        return `<select class="cell-select" data-id="${r.id}" data-key="${key}">${['2F','3F','4F','5F'].map(v => `<option ${v === r[key] ? 'selected' : ''}>${v}</option>`).join('')}</select>`;
      }
      if (key === 'priority') {
        return `<select class="cell-select" data-id="${r.id}" data-key="${key}">${['高','中','低'].map(v => `<option ${v === r[key] ? 'selected' : ''}>${v}</option>`).join('')}</select>`;
      }
      if (key === 'catchDate') {
        return `<input class="cell-input" type="date" data-id="${r.id}" data-key="${key}" value="${value}">`;
      }
      if (['symptoms','testResult','treatment','mealWater','vitalsFinding','familyContact','consultation','progressNext'].includes(key)) {
        const isManual = ['testResult','treatment','mealWater','vitalsFinding','familyContact','consultation','progressNext'].includes(key);
        const placeholder = isManual ? '手入力してください' : '';
        const style = isManual ? 'min-height:78px;' : '';
        return `<textarea class="cell-textarea ${isManual ? 'field-mode-manual' : 'field-mode-auto'}" style="${style}" placeholder="${placeholder}" data-id="${r.id}" data-key="${key}">${value}</textarea>`;
      }
      const isManualInput = ['testResult','treatment','mealWater','vitalsFinding','familyContact','consultation','progressNext'].includes(key);
      return `<input class="cell-input ${isManualInput ? 'field-mode-manual' : 'field-mode-auto'}" data-id="${r.id}" data-key="${key}" value="${value}">`;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function bindEvents() {
      document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          btn.classList.add('active');
          const tab = btn.dataset.tab;
          document.getElementById('frontPanel').classList.toggle('hidden', tab !== 'front');
          document.getElementById('backPanel').classList.toggle('hidden', tab !== 'back');
        });
      });

      document.getElementById('newResidentForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const rec = {
          id: crypto.randomUUID(),
          name: String(fd.get('name') || '').trim(),
          room: String(fd.get('room') || '').trim(),
          floor: String(fd.get('floor') || ''),
          priority: String(fd.get('priority') || ''),
          catchDate: String(fd.get('catchDate') || ''),
          symptoms: String(fd.get('mainSymptom') || ''),
          testResult: '', treatment: '', mealWater: '', vitalsFinding: '', familyContact: '', consultation: '', progressNext: '',
          calendar: {}
        };

        if (!rec.name || !rec.room || !rec.floor || !rec.priority || !rec.catchDate || !rec.symptoms) {
          alert('必須項目を入力してください。');
          return;
        }

        rec.calendar[rec.catchDate] = { status: 'observe', note: '把握' };
        state.residents.push(rec);
        saveState();
        renderAll();
        e.target.reset();
      });

      document.getElementById('backTable').addEventListener('input', (e) => {
        const target = e.target;
        const id = target.dataset.id;
        const key = target.dataset.key;
        if (!id || !key) return;
        const rec = state.residents.find(x => x.id === id);
        if (!rec) return;
        rec[key] = target.value;
        saveState();
        renderCalendar();
      });

      document.getElementById('backTable').addEventListener('click', (e) => {
        const id = e.target?.dataset?.delete;
        if (!id) return;
        if (!confirm('対象者を削除しますか？')) return;
        state.residents = state.residents.filter(r => r.id !== id);
        saveState();
        renderAll();
      });

      document.getElementById('calendarTable').addEventListener('click', async (e) => {
        const cell = e.target.closest('.day-cell');
        if (!cell) return;
        const residentId = cell.dataset.residentId;
        const date = cell.dataset.date;
        if (!residentId || !date) return;
        const resident = state.residents.find(r => r.id === residentId);
        if (!resident) return;

        const dialog = document.getElementById('dayDialog');
        const form = document.getElementById('dayForm');
        const current = resident.calendar?.[date] || {};
        document.getElementById('dayDialogTitle').textContent = `${resident.name} / ${date} (${getWeekdayJa(date)})`;
        form.status.value = current.status || '';
        form.note.value = current.note || '';
        dialog.showModal();

        const result = await new Promise(resolve => {
          dialog.addEventListener('close', () => resolve(dialog.returnValue), { once: true });
        });

        if (result === 'save') {
          const status = form.status.value;
          const note = form.note.value.trim();
          if (!resident.calendar) resident.calendar = {};
          if (!status && !note) {
            delete resident.calendar[date];
          } else {
            const prev = resident.calendar[date] || {};
            resident.calendar[date] = {
              ...prev,
              status,
              note
            };
          }
          saveState();
          renderAll();
        }
      });

      document.getElementById('saveBtn').addEventListener('click', () => {
        saveState();
        alert('保存しました。');
      });

      document.getElementById('exportJsonBtn').addEventListener('click', () => {
        downloadFile('care-condition-board-v4.json', JSON.stringify(state, null, 2), 'application/json');
      });

      document.getElementById('importJsonInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const text = await file.text();
        try {
          const parsed = JSON.parse(text);
          if (!Array.isArray(parsed.residents)) throw new Error('Invalid format');
          state.meta = { ...state.meta, ...(parsed.meta || {}) };
          state.residents = parsed.residents;
          saveState();
          renderAll();
          alert('JSONを取り込みました。');
        } catch {
          alert('JSON形式が不正です。');
        }
        e.target.value = '';
      });

      document.getElementById('exportCsvBtn').addEventListener('click', () => {
        const header = ['氏名','部屋','フロア','優先度','把握日','症状','検査結果','処方・対応','食事・水分','バイタル・所見','家族連絡','受診','経過・次対応'];
        const rows = state.residents.map(r => [r.name,r.room,r.floor,r.priority,r.catchDate,r.symptoms,r.testResult,r.treatment,r.mealWater,r.vitalsFinding,r.familyContact,r.consultation,r.progressNext]);
        const csv = [header, ...rows].map(cols => cols.map(v => `"${String(v ?? '').replace(/"/g, '""')}"`).join(',')).join('\n');
        downloadFile('care-condition-board-v4.csv', csv, 'text/csv');
      });

      document.getElementById('resetBtn').addEventListener('click', () => {
        if (!confirm('入力内容を初期化します。よろしいですか？')) return;
        localStorage.removeItem(STORAGE_KEY);
        state.residents = createDefaultResidents();
        renderAll();
      });
    }

    function downloadFile(filename, content, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function verifyMarch2026Weekdays() {
      const expected = {
        '2026-03-19': '木','2026-03-20': '金','2026-03-21': '土','2026-03-22': '日','2026-03-23': '月','2026-03-24': '火','2026-03-25': '水',
        '2026-03-26': '木','2026-03-27': '金','2026-03-28': '土','2026-03-29': '日','2026-03-30': '月','2026-03-31': '火','2026-04-01': '水'
      };
      const mismatches = Object.entries(expected).filter(([d, w]) => getWeekdayJa(d) !== w);
      if (mismatches.length) {
        console.error('曜日不一致', mismatches);
      }
    }

    loadState();
    renderAll();
    bindEvents();
    verifyMarch2026Weekdays();
  </script>
</body>
</html>
